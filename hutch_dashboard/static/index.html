<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hutch Flow Archive</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-mark">H</div>
          <div>
            <h1>Hutch Archive</h1>
            <p>已完成 Flow 实例</p>
          </div>
        </header>
        <div class="sidebar-tools">
          <span id="run-count">加载中</span>
          <button id="refresh" type="button">刷新</button>
        </div>
        <nav id="run-list" class="run-list" aria-label="Flow instances"></nav>
        <footer>
          数据来自 Hutch run 证据目录。CAO 只负责实时执行。
        </footer>
      </aside>

      <section id="detail" class="detail">
        <div class="empty-state">
          <div class="empty-icon">↖</div>
          <h2>选择一个 Flow 实例</h2>
          <p>查看执行摘要、Agent session、terminal 以及文本交付物。</p>
        </div>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
